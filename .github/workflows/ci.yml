name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint + typecheck + tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: test
          POSTGRES_DB: nexus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexus -d nexus"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://nexus:test@localhost:5432/nexus?schema=public
      # Throwaway test-only key (base64 32 bytes). NOT a production secret.
      NEXUS_MASTER_KEY: gfKqo18WLBm5hWQRX+NVuSmcKJHpuAi+92UbkVYCK8Q=
      NEXTAUTH_SECRET: ci-test-secret
      NEXTAUTH_URL: http://localhost:3000
      NEXUS_ALLOWED_EMAIL_DOMAIN: procurementgarage.com

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit + integration tests
        run: npx vitest run
